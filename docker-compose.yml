version: "3.9"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  traefik:
    image: traefik:v3.0
    ports:
      - "8080:80"
      - "8081:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build: ./orchestrator
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=PathPrefix(`/api/content`) || PathPrefix(`/api/phones`)"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8001"

  worker-phone-001:
    build: ./workers
    environment:
      PHONE_SERIAL: ${PHONE_001_SERIAL:-phone_001}
      REDIS_URL: ${REDIS_URL}
      ORCHESTRATOR_URL: http://orchestrator:8001
    networks:
      - internal
    devices:
      - /dev/bus/usb:/dev/bus/usb
    depends_on:
      - redis
      - orchestrator

  sportzavod:
    build: ./sportzavod
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY}
      ORCHESTRATOR_URL: http://orchestrator:8001
    networks:
      - internal
    depends_on:
      - orchestrator
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sportzavod.rule=PathPrefix(`/api/sportzavod`)"
      - "traefik.http.middlewares.sportzavod-strip.stripprefix.prefixes=/api/sportzavod"
      - "traefik.http.routers.sportzavod.middlewares=sportzavod-strip"
      - "traefik.http.services.sportzavod.loadbalancer.server.port=8000"

  contentzavod:
    build: ./contentzavod
    environment:
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      ORCHESTRATOR_URL: http://orchestrator:8001
    networks:
      - internal
    depends_on:
      - orchestrator
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.contentzavod.rule=PathPrefix(`/api/contentzavod`)"
      - "traefik.http.middlewares.contentzavod-strip.stripprefix.prefixes=/api/contentzavod"
      - "traefik.http.routers.contentzavod.middlewares=contentzavod-strip"
      - "traefik.http.services.contentzavod.loadbalancer.server.port=8002"
